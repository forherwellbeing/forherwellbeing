function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) {
    return (
      <button onClick={() => setOpen(true)} style={{ position:'fixed', right:16, bottom:16, zIndex:2147483646, background:'rgba(176,90,114,0.9)', color:'#fff', border:'none', borderRadius:10, padding:'8px 14px', fontSize:12, fontWeight:600, cursor:'pointer', backdropFilter:'blur(8px)', boxShadow:'0 4px 16px rgba(0,0,0,0.2)' }}>
        🎨 Tweaks
      </button>
    );
  }
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </div>
  );
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
const LineChart = ({ data, width=360, height=130, color='#B05A72' }) => {
  const p = { t:10, r:10, b:26, l:10 };
  const w = width-p.l-p.r, h = height-p.t-p.b;
  const max = Math.max(...data.map(d=>d.v))*1.12;
  const pts = data.map((d,i) => [p.l+(i/(data.length-1))*w, p.t+h-((d.v)/(max))*h]);
  const line = pts.map(([x,y])=>`${x},${y}`).join(' ');
  const area = `M${pts[0]} ${pts.slice(1).map(([x,y])=>`L${x},${y}`).join(' ')} L${p.l+w},${p.t+h} L${p.l},${p.t+h} Z`;
  return (
    <svg width={width} height={height} style={{ overflow:'visible' }}>
      <defs><linearGradient id="lcg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#lcg)" />
      <polyline fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" points={line} />
      {pts.map(([x,y],i) => <circle key={i} cx={x} cy={y} r={3.5} fill={color} />)}
      {data.map((d,i) => <text key={i} x={pts[i][0]} y={height-4} textAnchor="middle" fontSize={10} fill="#7A7A8A">{d.l}</text>)}
    </svg>
  );
};

const BarChart = ({ data, width=440, height=155, color='#B05A72' }) => {
  const p = { t:8, r:8, b:24, l:8 };
  const w = width-p.l-p.r, h = height-p.t-p.b;
  const max = Math.max(...data.map(d=>d.v))*1.18;
  const bw = (w/data.length)*0.52;
  return (
    <svg width={width} height={height}>
      {data.map((d,i) => {
        const bh = (d.v/max)*h;
        const x = p.l+(i/data.length)*w+(w/data.length-bw)/2;
        const y = p.t+h-bh;
        return <g key={i}><rect x={x} y={y} width={bw} height={bh} rx={5} fill={color} opacity={0.82}/><text x={x+bw/2} y={height-5} textAnchor="middle" fontSize={10} fill="#7A7A8A">{d.l}</text></g>;
      })}
    </svg>

};

const DonutChart = ({ segs, size=108 }) => {
  const r = size*0.38, cx=size/2, cy=size/2;
  const total = segs.reduce((s,d)=>s+d.v, 0);
  let ang = -Math.PI/2;
  const paths = segs.map(d => {
    const a0 = ang, da = (d.v/total)*Math.PI*2; ang += da;
    const x1=cx+r*Math.cos(a0), y1=cy+r*Math.sin(a0);
    const x2=cx+r*Math.cos(ang), y2=cy+r*Math.sin(ang);
    return { d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${da>Math.PI?1:0},1 ${x2},${y2} Z`, color:d.color };
  });
  return <svg width={size} height={size}><circle cx={cx} cy={cy} r={r*0.6} fill="white"/>{paths.map((p,i)=><path key={i} d={p.d} fill={p.color}/>)}</svg>;
};

const StaffPatients = ({ T }) => {
  const [patients, setPatients] = useState(PATIENTS);
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [editPt, setEditPt] = useState(null);
  const blank = { name:'', age:'', contact:'', condition:'', program:'', status:'Active' };
  const [form, setForm] = useState(blank);
  const filtered = patients.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  const upd = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const handleSave = () => {
    if (editPt) setPatients(pts=>pts.map(p=>p.id===editPt.id?{...p,...form}:p));
    else setPatients(pts=>[...pts,{ id:Date.now(), ...form, doctor:'Dr. Raga Deepthi', lastVisit:new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) }]);
    setShowModal(false); setEditPt(null); setForm(blank);
  };
  const openEdit = p => { setEditPt(p); setForm({ name:p.name, age:p.age, contact:p.contact, condition:p.condition, program:p.program, status:p.status }); setShowModal(true); };
  const del = id => { if(window.confirm('Delete this patient record?')) setPatients(pts=>pts.filter(p=>p.id!==id)); };
  return (
    <div>
      <div style={{ display:'flex', gap:12, marginBottom:16, alignItems:'center' }}>
        <div style={{ position:'relative', flex:1 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search patients…" style={{ width:'100%', background:'#fff', border:'1.5px solid #EDE8E5', borderRadius:10, padding:'10px 14px 10px 36px', fontSize:13.5, outline:'none' }} />
          <span style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'#7A7A8A' }}>⌕</span>
        </div>
        <Btn variant="primary" T={T} onClick={()=>{ setEditPt(null); setForm(blank); setShowModal(true); }}>+ Add Patient</Btn>
      </div>
      <div style={{ background:'#fff', borderRadius:16, boxShadow:'0 2px 14px rgba(0,0,0,0.05)', overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr style={{ background:'#FAFAFA', borderBottom:'1px solid #EDE8E5' }}>
            {['Patient','Age','Condition','Program','Last Visit','Status','Actions'].map(h=><th key={h} style={{ padding:'11px 15px', textAlign:'left', fontSize:11.5, fontWeight:600, color:'#7A7A8A', textTransform:'uppercase', letterSpacing:'0.05em', whiteSpace:'nowrap' }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filtered.map(p=>(
              <tr key={p.id} style={{ borderBottom:'1px solid #EDE8E5' }}>
                <td style={{ padding:'12px 15px' }}><div style={{ display:'flex', alignItems:'center', gap:10 }}><Avatar name={p.name} size={31}/><span style={{ fontWeight:500, fontSize:13.5 }}>{p.name}</span></div></td>
                <td style={{ padding:'12px 15px', fontSize:13.5, color:'#7A7A8A' }}>{p.age}</td>
                <td style={{ padding:'12px 15px', fontSize:13.5 }}>{p.condition}</td>
                <td style={{ padding:'12px 15px', fontSize:12.5, color:'#7A7A8A' }}>{p.program}</td>
                <td style={{ padding:'12px 15px', fontSize:12.5, color:'#7A7A8A' }}>{p.lastVisit}</td>
                <td style={{ padding:'12px 15px' }}><Badge text={p.status}/></td>
                <td style={{ padding:'12px 15px' }}><div style={{ display:'flex', gap:6 }}><Btn size="sm" variant="secondary" T={T} onClick={()=>openEdit(p)}>Edit</Btn><Btn size="sm" variant="danger" T={T} onClick={()=>del(p.id)}>Delete</Btn></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <Modal open={showModal} onClose={()=>{setShowModal(false);setEditPt(null);}} title={editPt?'Edit Patient':'Add New Patient'}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          <FF label="Full Name *"><Input value={form.name} onChange={upd('name')} placeholder="Full name" /></FF>
          <FF label="Age *"><Input type="number" value={form.age} onChange={upd('age')} placeholder="Age" /></FF>
          <FF label="Contact *"><Input value={form.contact} onChange={upd('contact')} placeholder="+91 XXXXX XXXXX" /></FF>
          <FF label="Status"><Sel value={form.status} onChange={upd('status')}><option>Active</option><option>Inactive</option></Sel></FF>
        </div>
        <FF label="Condition / Diagnosis *"><Input value={form.condition} onChange={upd('condition')} placeholder="e.g. PCOS, Thyroid Imbalance" /></FF>
        <FF label="Program"><Sel value={form.program} onChange={upd('program')}><option value="">Select program…</option><option>PCOS Healing</option><option>Women's Obesity</option><option>Metabolic Reset</option><option>Diabetes Management</option><option>Prenatal Wellness</option><option>Postnatal Recovery</option></Sel></FF>
        <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
          <Btn variant="ghost" T={T} onClick={()=>{setShowModal(false);setEditPt(null);}}>Cancel</Btn>
          <Btn variant="primary" T={T} onClick={handleSave}>{editPt?'Save Changes':'Add Patient'}</Btn>
        </div>
      </Modal>
    </div>
  );
};

// ── LOGIN ─────────────────────────────────────────────────────────────────────

        <div style={{ position:'absolute', top:-30, right:-30, width:130, height:130, borderRadius:'50%', border:`1px solid ${T2.accent}18` }}/>

          <div style={{ fontSize:10, color:'rgba(255,255,255,0.3)', letterSpacing:'0.1em', textTransform:'uppercase', marginTop:8 }}>Healthcare Management Portal</div>
        </div>
        <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:30, fontWeight:600, color:'#FAF8F5', lineHeight:1.5, marginBottom:20 }}>

// ── APP ROOT ──────────────────────────────────────────────────────────────────
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const T = mkT(tweaks);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('overview');

  const PAGE_TITLES = {
    overview: 'Dashboard',
    patients: user?.role==='doctor' ? 'Patients' : 'Patient Management',
    consultations: 'Consultations',
    prescriptions: 'Prescriptions',
    appointments: 'Appointments',
    billing: 'Billing & Payments',
    reports: 'Reports',
    profile: 'Profile',
  };

  if (!user) return <LoginPage onLogin={role=>{ setUser({role}); setPage('overview'); }} />;

  const renderPage = () => {
    if (user.role==='doctor') {
      if (page==='overview')      return <DoctorOverview T={T}/>;
      if (page==='patients')      return <DoctorPatients T={T}/>;
      if (page==='consultations') return <DoctorConsultations T={T}/>;
      if (page==='prescriptions') return <DoctorPrescriptions T={T}/>;
      if (page==='reports')       return <ReportsPage T={T}/>;
      if (page==='profile')       return <ProfilePage role="doctor" T={T}/>;
    } else {
      if (page==='overview')     return <StaffOverview T={T}/>;
      if (page==='patients')     return <StaffPatients T={T}/>;
      if (page==='appointments') return <StaffAppointments T={T}/>;
      if (page==='billing')      return <StaffBilling T={T}/>;
      if (page==='reports')      return <ReportsPage T={T}/>;
      if (page==='profile')      return <ProfilePage role="staff" T={T}/>;
    }
    return null;
  };

  return (
    <div style={{ display:'flex', height:'100vh', background:T.bg }}>
      <Sidebar role={user.role} activePage={page} setActivePage={setPage} onLogout={()=>setUser(null)} T={T}/>
      <div style={{ flex:1, marginLeft:238, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar title={PAGE_TITLES[page]||'Dashboard'} role={user.role}/>
        <div style={{ flex:1, overflowY:'auto', padding:'22px 26px' }}>
          {renderPage()}
        </div>
      </div>
      <TweaksPanel>
        <TweakSection label="Branding">
          <TweakColor label="Accent Color"  value={tweaks.accentColor}  onChange={v => setTweak('accentColor', v)} />
          <TweakColor label="Sidebar Color" value={tweaks.sidebarColor} onChange={v => setTweak('sidebarColor', v)} />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Density" value={tweaks.density} options={['comfortable','compact']} onChange={v => setTweak('density', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
