<style>
.err-wrap { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 1.5rem; }
.err-code { font-family: var(--serif); font-size: clamp(5rem, 18vw, 9rem); font-style: italic; color: var(--plum); opacity: 0.12; line-height: 1; margin-bottom: -1rem; }
.err-title { font-family: var(--serif); font-size: clamp(1.6rem, 4vw, 2.4rem); color: var(--plum); margin-bottom: 1rem; }
.err-sub { font-family: var(--sans); font-size: 0.95rem; font-weight: 300; color: var(--text-mid); max-width: 400px; line-height: 1.7; margin-bottom: 2.5rem; }
.err-links { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
.err-links a { font-family: var(--sans); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.7rem 1.4rem; border-radius: 50px; text-decoration: none; transition: all 0.2s; }
.err-home { background: var(--plum); color: var(--white); }
.err-home:hover { opacity: 0.88; }
.err-alt { background: transparent; color: var(--plum); border: 1.5px solid var(--plum); }
.err-alt:hover { background: var(--plum); color: var(--white); }
</style>
</head>
